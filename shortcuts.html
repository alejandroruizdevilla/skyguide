<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SkyGuide - Keyboard Shortcuts Reference</title>
  <meta name="description" content="Quick reference for keyboard shortcuts across popular flight simulators: MSFS 2024, X-Plane 12, DCS World, and IL-2 Sturmovik.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <style>
    :root {
      --bg: #faf8f6;
      --bg-card: #ffffff;
      --accent: #c17a4a;
      --accent-alt: #a66843;
      --accent-light: #f4e8df;
      --text-main: #2d2520;
      --text-secondary: #6b5d54;
      --text-muted: #9b8a7f;
      --border-light: #e8dfd6;
      --shadow-soft: 0 2px 12px rgba(45, 37, 32, 0.08);
      --shadow-hover: 0 8px 24px rgba(45, 37, 32, 0.12);
    }

    [data-theme="dark"] {
      --bg: #1a1614;
      --bg-card: #2d2520;
      --accent: #e8b87e;
      --accent-alt: #d4a574;
      --accent-light: #3d3530;
      --text-main: #f4e8df;
      --text-secondary: #d4c5b8;
      --text-muted: #9b8a7f;
      --border-light: #4a403a;
      --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.7;
      padding: 2rem 1rem;
      font-size: 16px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Navigation */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--bg-card);
      border-radius: 12px;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-soft);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: var(--accent);
    }

    .nav-link.active {
      color: var(--accent);
      font-weight: 600;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--accent);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      transition: all 0.2s;
    }

    .logo:hover {
      color: var(--accent-alt);
      transform: translateY(-1px);
    }

    .logo svg {
      width: 28px;
      height: 28px;
    }

    .dark-mode-toggle {
      background: var(--accent-light);
      border: 1px solid var(--border-light);
      color: var(--text-main);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .dark-mode-toggle:hover {
      background: var(--accent);
      color: #fff;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .title {
      color: var(--accent);
      margin-bottom: 0.5rem;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--accent-alt);
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 1rem;
    }

    /* Toolbar: search + print */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .search-wrapper {
      position: relative;
      flex: 1;
      max-width: 420px;
    }

    .search-wrapper svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.6rem;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text-main);
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(193, 122, 74, 0.15);
    }

    .print-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .print-btn:hover {
      background: var(--accent-alt);
      transform: translateY(-1px);
    }

    .print-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 0.65rem 1.4rem;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .tab-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Shortcut Categories */
    .shortcut-panel {
      display: none;
    }

    .shortcut-panel.active {
      display: block;
    }

    .category {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border-light);
      background: var(--accent-light);
    }

    .category-icon {
      font-size: 20px;
      line-height: 1;
    }

    .category-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-main);
    }

    /* Shortcut rows */
    .shortcut-list {
      list-style: none;
    }

    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border-light);
      transition: background 0.15s;
    }

    .shortcut-row:last-child {
      border-bottom: none;
    }

    .shortcut-row:hover {
      background: var(--accent-light);
    }

    .shortcut-row.hidden {
      display: none;
    }

    .shortcut-action {
      font-size: 14px;
      color: var(--text-main);
      flex: 1;
    }

    .shortcut-keys {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      flex-shrink: 0;
      margin-left: 1rem;
    }

    kbd {
      display: inline-block;
      padding: 0.25rem 0.55rem;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: 5px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06), inset 0 -1px 0 rgba(0, 0, 0, 0.06);
      white-space: nowrap;
      line-height: 1.4;
    }

    .key-separator {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
    }

    /* No results message */
    .no-results {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 15px;
      display: none;
    }

    .no-results.visible {
      display: block;
    }

    /* Print styles */
    @media print {
      .nav, .toolbar, .tabs, .dark-mode-toggle, .print-btn {
        display: none !important;
      }
      body {
        padding: 0;
        font-size: 12px;
        color: #000;
        background: #fff;
      }
      .header {
        margin-bottom: 1rem;
      }
      .title {
        font-size: 24px;
        color: #333;
      }
      .subtitle {
        font-size: 14px;
        color: #666;
      }
      .shortcut-panel {
        display: block !important;
      }
      .shortcut-panel::before {
        content: attr(data-sim-name);
        display: block;
        font-size: 18px;
        font-weight: 700;
        margin: 1.5rem 0 0.5rem;
        color: #333;
        border-bottom: 2px solid #ccc;
        padding-bottom: 0.25rem;
      }
      .category {
        box-shadow: none;
        border: 1px solid #ddd;
        break-inside: avoid;
        margin-bottom: 1rem;
      }
      .category-header {
        background: #f0f0f0;
      }
      .shortcut-row:hover {
        background: none;
      }
      kbd {
        border: 1px solid #aaa;
        background: #f5f5f5;
        color: #000;
        box-shadow: none;
      }
    }

    /* Responsive */
    @media (max-width: 700px) {
      .nav {
        padding: 1rem;
      }
      .nav-links {
        gap: 0.75rem;
      }
      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      .search-wrapper {
        max-width: 100%;
      }
      .tabs {
        gap: 0.35rem;
      }
      .tab-btn {
        padding: 0.5rem 0.9rem;
        font-size: 13px;
      }
      .shortcut-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.4rem;
        padding: 0.85rem 1.25rem;
      }
      .shortcut-keys {
        margin-left: 0;
      }
    }
  </style>
</head>

<script>
// ── Dark Mode ──
const darkModeToggle = document.getElementById('darkModeToggle');
const html = document.documentElement;

const savedTheme = localStorage.getItem('theme') || 'light';
html.setAttribute('data-theme', savedTheme);
darkModeToggle.textContent = savedTheme === 'dark' ? 'Light Mode' : 'Dark Mode';

darkModeToggle.addEventListener('click', () => {
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  darkModeToggle.textContent = newTheme === 'dark' ? 'Light Mode' : 'Dark Mode';
});

          { keys: ['Shift', 'B'], action: 'Toggle bomb bay doors' },
          { keys: ['Ctrl', 'Space'], action: 'Fire secondary weapons' }
        ]
      },
      {
        title: 'Miscellaneous',
        icon: '\uD83D\uDCCB',
        shortcuts: [
          { keys: ['P'], action: 'Pause simulation' },
          { keys: ['Tab'], action: 'Open in-flight map' },
          { keys: ['\\'], action: 'Open radio communication menu' },
          { keys: ['O'], action: 'Open / close technical chat' },
          { keys: ['Print Screen'], action: 'Take screenshot' },
          { keys: ['Shift', 'T'], action: 'Toggle trim indicator' }
        ]
      }
    ]
  }
};

// ── Render Panels ──
const panelsContainer = document.getElementById('panelsContainer');

Object.entries(shortcutData).forEach(([simKey, sim]) => {
  const panel = document.createElement('div');
  panel.className = 'shortcut-panel' + (simKey === 'msfs' ? ' active' : '');
  panel.id = 'panel-' + simKey;
  panel.setAttribute('data-sim-name', sim.name);

  sim.categories.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'category';

    const headerHTML =
      '<div class="category-header">' +
        '<span class="category-icon">' + cat.icon + '</span>' +
        '<span class="category-title">' + cat.title + '</span>' +
      '</div>';

    let rowsHTML = '<ul class="shortcut-list">';
    cat.shortcuts.forEach(sc => {
      const keysHTML = sc.keys.map(k => '<kbd>' + k + '</kbd>').join('<span class="key-separator">+</span>');
      rowsHTML +=
        '<li class="shortcut-row" data-search="' + (sc.action + ' ' + sc.keys.join(' ')).toLowerCase() + '">' +
          '<span class="shortcut-action">' + sc.action + '</span>' +
          '<span class="shortcut-keys">' + keysHTML + '</span>' +
        '</li>';
    });
    rowsHTML += '</ul>';

    section.innerHTML = headerHTML + rowsHTML;
    panel.appendChild(section);
  });

  panelsContainer.appendChild(panel);
});

// ── Tab Switching ──
const tabs = document.querySelectorAll('.tab-btn');
const panels = document.querySelectorAll('.shortcut-panel');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    panels.forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.sim).classList.add('active');
    applySearch();
  });
});

// ── Search / Filter ──
const searchInput = document.getElementById('searchInput');
const noResults = document.getElementById('noResults');

function applySearch() {
  const query = searchInput.value.trim().toLowerCase();
  const activePanel = document.querySelector('.shortcut-panel.active');
  if (!activePanel) return;

  const rows = activePanel.querySelectorAll('.shortcut-row');
  const categories = activePanel.querySelectorAll('.category');
  let totalVisible = 0;

  rows.forEach(row => {
    const match = !query || row.getAttribute('data-search').includes(query);
    row.classList.toggle('hidden', !match);
    if (match) totalVisible++;
  });

  // Hide categories that have zero visible rows
  categories.forEach(cat => {
    const visibleRows = cat.querySelectorAll('.shortcut-row:not(.hidden)');
    cat.style.display = visibleRows.length ? '' : 'none';
  });

  noResults.classList.toggle('visible', totalVisible === 0 && query.length > 0);
}

searchInput.addEventListener('input', applySearch);

// ── Print ──
document.getElementById('printBtn').addEventListener('click', () => {
  window.print();
});
</script>
</body>
