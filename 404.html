<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SkyGuide - Page Not Found</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root {
      --bg: #faf8f6;
      --bg-card: #ffffff;
      --accent: #c17a4a;
      --accent-alt: #a66843;
      --accent-light: #f4e8df;
      --text-main: #2d2520;
      --text-secondary: #6b5d54;
      --border-light: #e8dfd6;
      --shadow-soft: 0 2px 12px rgba(45, 37, 32, 0.08);
    }
    [data-theme="dark"] {
      --bg: #1a1614;
      --bg-card: #2d2520;
      --accent: #e8b87e;
      --accent-alt: #d4a574;
      --accent-light: #3d3530;
      --text-main: #f4e8df;
      --text-secondary: #d4c5b8;
      --border-light: #4a403a;
      --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    .error-code {
      font-size: 120px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: -4px;
    }
    .plane-animation {
      font-size: 48px;
      margin: 1rem 0;
      animation: fly 3s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes fly {
      0%, 100% { transform: translateX(-30px) rotate(-5deg); }
      50% { transform: translateX(30px) rotate(5deg); }
    }
    h1 {
      font-size: 28px;
      color: var(--text-main);
      margin-bottom: 1rem;
      font-weight: 600;
    }
    p {
      color: var(--text-secondary);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--accent-alt);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(193, 122, 74, 0.3);
    }
    .btn-secondary {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-secondary:hover {
      background: var(--accent);
      color: #fff;
    }
    .radar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      margin: 2rem auto;
      position: relative;
      overflow: hidden;
      opacity: 0.4;
    }
    .radar::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 50%;
      height: 2px;
      background: var(--accent);
      transform-origin: left center;
      animation: radarSweep 2s linear infinite;
    }
    .radar::after {
      content: '+';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--accent);
      font-size: 20px;
    }
    @keyframes radarSweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <div class="plane-animation">&#9992;</div>
    <h1>Flight Plan Not Found</h1>
    <p>Looks like this page flew off the radar. The page you're looking for doesn't exist or has been moved to a different hangar.</p>
    <div class="radar"></div>
    <div class="links">
      <a href="index.html" class="btn btn-primary">Back to Home</a>
      <a href="sim-advisor.html" class="btn btn-secondary">AI Advisor</a>
    </div>
  </div>
  <script>
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const savedTheme = localStorage.getItem('theme') || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</body>
</html>
